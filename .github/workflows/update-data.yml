name: Update dashboard data

on:
  schedule:
    - cron: "0 8 1 * *" # 8am UTC on the 1st of each month
  workflow_dispatch: # manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push data/output back to repo
      actions: write # needed to trigger the deploy workflow

    steps:
      - uses: actions/checkout@v5

      - name: Set run timestamp
        id: ts
        run: echo "label=$(date +'%B %-d, %Y at %I:%M %p UTC')" >> $GITHUB_OUTPUT

      - uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: research
          auto-activate: false

      - name: Run pipeline
        shell: bash -el {0}
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          BEA_API_KEY: ${{ secrets.BEA_API_KEY }}
        run: python pipeline/run_pipeline.py

      - name: Commit updated output
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update data $(date +%Y-%m)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main

      - name: Build notification message
        id: notify
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "body=BRO! 21-county pipeline run was successful. Crushing lyfe." >> $GITHUB_OUTPUT
          else
            echo "body=bro... the pipeline failed. Somewhere out there, a county is crying. Check the logs and fix it before anyone notices." >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ARC Dashboard Pipeline <${{ secrets.GMAIL_USERNAME }}>
          subject: "ARC data update ${{ job.status == 'success' && '✓' || '✗' }} — ${{ steps.ts.outputs.label }}"
          body: |
            ${{ steps.notify.outputs.body }}

            View logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
